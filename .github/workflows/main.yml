name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  client-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./client/package-lock.json

    - name: Install dependencies
      run: npm install

    - name: Build client
      run: npm run build

  backend-placeholder:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Backend Placeholder
      run: echo "Backend CI/CD will be implemented here once the backend is ready."
